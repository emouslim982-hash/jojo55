<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Background Music (Optional, user initiates) -->
    <!-- <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio> -->

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- UI Overlay -->
        <div id="ui-layer">
            <div id="score-board">
                <span>🥰​​جمعي قد عدد حروف الإسم المفضل لدي​: </span>
                <div class="progress-bar">
                    <div id="love-fill"></div>
                </div>
            </div>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>😅عندو ماراو يستنى فيك</h1>
            
            <p>ولا أكي حبا تعرفي واش كاين فل رسالة اتفضلي عبزي الدخول</p>

            <button id="start-btn" class="btn">الدخول</button>
        </div>

        <!-- Proposal Modal (Hidden initially) -->
        <div id="proposal-screen" class="screen hidden">
            <div class="proposal-content">
                <h1>هل أنتي طفلة صغيرة في نضري</h1>
                <p class="sub-text">ولا اكي حابا تدخلي جاوبي بصراحا يمكن أن يكون الجواب  ليس مثلما تعودة عليه</p>
                <div class="buttons">
                    <button id="yes-btn" class="btn yes-btn">نعم وبطبع</button>
                    <button id="no-btn" class="btn no-btn">لا أبدا انا كبيرة </button>
                </div>
            </div>
        </div>

        <!-- Celebration Overlay -->
        <div id="celebration-screen" class="screen hidden">
            <h1>Happy Propose Day! 💍</h1>
            <p>I love you!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
